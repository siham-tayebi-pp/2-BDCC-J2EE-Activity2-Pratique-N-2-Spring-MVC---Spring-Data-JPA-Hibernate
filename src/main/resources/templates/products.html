<!DOCTYPE html>
<!--declarer namespace de theamleaf-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
      xmlns:sec="htp://www.thymeleaf.org/extras/spring-security"
>
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.6/css/bootstrap.min.css" >
</head>
<body>
<div class="p-3" layout:fragment="content">
    <div class="p-3" sec:authorize="hasRole('ADMIN')">
        <a class="btn  btn-primary" th:href="@{/admin/newProduct}">New product</a>
    </div>
    <table class="table">
        <thead>
        <th>ID</th><th>Name </th> <th>Price</th> <th>Quantity</th>
        </thead>
        <tbody>
        <tr th:each="p:${productsList}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <form method="post" th:action="@{/admin/delete(id=${p.id})}">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
<!--                <a class="btn btn-danger" th:href="@{/admin/delete(id=${p.id})}" onclick="return confirm('Etes vous sure de vouloir supprimer??')">Delete</a>-->
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
