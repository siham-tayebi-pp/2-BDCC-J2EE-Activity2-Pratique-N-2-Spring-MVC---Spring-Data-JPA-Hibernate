<!DOCTYPE html>
<!--declarer namespace de theamleaf-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.6/css/bootstrap.min.css" >
</head>
<body>
<div class="p-3" layout:fragment="content">
    <div class="p-3">
<!--        md 6 cad que moitie de page car bootstrap utilse que 12 col
offset 3 cad decaler de 3 col
-->
        <div class="col col-md-6 offset-3">\
            <div class="card">
                <div class="card-header">
                        Authentcation
                </div>
                <div class="card-body">
                    <form method="post" th:action="@{/login}">
                        <div class="mb-3" >
                            <label class="form-label">username</label>
                            <input type="text" name="username" class="form-control" >
                        </div>
                        <div class="mb-3" >
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" >
                        </div>
                        <button class="btn btn-primary">login</button>
                    </form>

                </div>
            </div>
              </div>
    </div>
</div>
</body>
</html>
